<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Repeat - Loyalty program management platform" />
    <meta name="theme-color" content="#000000" />
    <title>Repeat</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fast short-URL redirect — resolves before React bundles load
      ;(function () {
        var m = window.location.pathname.match(/^\/s\/([A-Za-z0-9_-]{8})$/)
        if (!m) return
        var raw = '%VITE_API_URL%'
        var base = raw && raw.indexOf('%') === -1 ? raw : '/api'
        fetch(base + '/short-urls/' + m[1])
          .then(function (r) {
            return r.json()
          })
          .then(function (d) {
            var url = d && d.data && d.data.original_url
            if (url) window.location.replace(url)
          })
          .catch(function () {})
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
