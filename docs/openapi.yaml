openapi: 3.1.0
info:
  title: Repeat Service API
  version: 1.0.0
  description: REST API for the Repeat loyalty card platform. Manages brands, stores, loyalty programs, stamp cards, and wallet integrations (Apple Wallet, Google Wallet).
  license:
    name: Proprietary

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://service-dev.repeat.la
    description: Development
  - url: https://service-stg.repeat.la
    description: Staging
  - url: https://service.repeat.la
    description: Production

tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication & user management
  - name: brands
    description: Brand management
  - name: stores
    description: Store management
  - name: loyalty-programs
    description: Loyalty program management
  - name: loyalty-cards
    description: Loyalty card issuance & retrieval
  - name: transactions
    description: Stamp transactions
  - name: redemptions
    description: Reward redemptions
  - name: apple-wallet
    description: Apple PassKit Web Service endpoints
  - name: notifications
    description: Wallet push notifications
  - name: short-urls
    description: URL shortener for loyalty card links
  - name: images
    description: Stamp card image generation (async)

security:
  - BearerAuth: []

paths:
  # ─── Health ───────────────────────────────────────────
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  message: { type: string }
                  logLevel: { type: string }
                  timestamp: { type: string, format: date-time }
        '404':
          description: Not found
        '500':
          description: Internal server error

  # ─── Auth ─────────────────────────────────────────────
  /auth/register:
    post:
      tags: [auth]
      summary: Register a customer
      operationId: registerCustomer
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, full_name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, description: Must contain uppercase and number }
                full_name: { type: string, minLength: 2 }
                phone: { type: string, minLength: 5 }
      responses:
        '201':
          $ref: '#/components/responses/MessageResponse'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/brand-admin:
    post:
      tags: [auth]
      summary: Register a brand admin
      operationId: registerBrandAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, full_name]
              properties:
                email: { type: string, format: email }
                password:
                  { type: string, minLength: 8, description: Must contain at least one uppercase letter and one number }
                full_name: { type: string, minLength: 2 }
                phone: { type: string, minLength: 5 }
      responses:
        '201':
          $ref: '#/components/responses/MessageResponse'
        '409':
          $ref: '#/components/responses/ConflictError'
    patch:
      tags: [auth]
      summary: Update brand admin profile
      operationId: updateBrandAdmin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string, minLength: 2 }
                phone: { type: string, minLength: 5 }
                birth_date: { type: string, format: date }
                language: { type: string, enum: [en, es] }
                onboarding_completed: { type: boolean }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user_id: { type: string, format: uuid }
                          full_name: { type: string }
                          phone: { type: ['string', 'null'] }
                          birth_date: { type: ['string', 'null'], format: date }
                          language: { type: ['string', 'null'] }
                          onboarding_completed: { type: boolean }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/verify-email:
    post:
      tags: [auth]
      summary: Verify email with token
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token]
              properties:
                email: { type: string, format: email }
                token: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /auth/login:
    post:
      tags: [auth]
      summary: Sign in (returns JWT)
      operationId: signIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token: { type: string }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/reset-password:
    post:
      tags: [auth]
      summary: Request password reset email
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /auth/update-password:
    post:
      tags: [auth]
      summary: Update password with reset token
      operationId: updatePassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password]
              properties:
                email: { type: string, format: email }
                token: { type: string }
                password:
                  { type: string, minLength: 8, description: Must contain at least one uppercase letter and one number }
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /auth/me:
    get:
      tags: [auth]
      summary: Get authenticated user profile
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          full_name: { type: string }
                          phone: { type: ['string', 'null'] }
                          birth_date: { type: ['string', 'null'], format: date }
                          language: { type: string }
                          brands:
                            type: array
                            items:
                              type: object
                              properties:
                                brand_id: { type: string, format: uuid }
                                brand_name: { type: string }
                                description: { type: ['string', 'null'] }
                                logo_url: { type: ['string', 'null'] }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ─── Brands ───────────────────────────────────────────
  /brands:
    post:
      tags: [brands]
      summary: Create a brand
      operationId: createBrand
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brand_name]
              properties:
                brand_name: { type: string, minLength: 2 }
                description: { type: string }
                owner_id: { type: string, format: uuid, description: Global admin only }
                logo_image: { type: string, description: 'Base64 encoded image (PNG or JPEG, max 1MB)' }
      responses:
        '201':
          description: Brand created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Brand'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /brands/{id}:
    get:
      tags: [brands]
      summary: Get brand by ID
      operationId: getBrand
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Brand details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Brand'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [brands]
      summary: Update brand
      operationId: updateBrand
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brand_name: { type: string, minLength: 2 }
                description: { type: string }
                logo_image: { type: string, description: 'Base64 encoded image (PNG or JPEG, max 1MB)' }
                is_active: { type: boolean }
      responses:
        '200':
          description: Brand updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Brand'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [brands]
      summary: Soft-delete brand
      operationId: deleteBrand
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /brands/{id}/stats:
    get:
      tags: [brands]
      summary: Get brand statistics
      operationId: getBrandStats
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: store_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Brand statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          brand_id: { type: string, format: uuid }
                          total_users: { type: integer }
                          total_active_programs: { type: integer }
                          transactions_by_type: { type: object, additionalProperties: { type: integer } }
                          total_completed_redemptions: { type: integer }
                          total_pending_redemptions: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequestError'

  /brands/{id}/stats/users:
    get:
      tags: [brands]
      summary: Get daily new customer history
      operationId: getBrandUserHistory
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: store_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Daily customer history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date }
                            new_users: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequestError'

  /brands/{id}/stats/transactions:
    get:
      tags: [brands]
      summary: Get daily transaction history
      operationId: getBrandTransactionHistory
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: store_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Daily transaction history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date }
                            transactions: { type: integer }
                            stamp_added: { type: integer }
                            purchase: { type: integer }
                            reward_redeemed: { type: integer }
                            giftcard_purchase: { type: integer }
                            giftcard_redeem: { type: integer }
                            discount_applied: { type: integer }
                            cashback_earned: { type: integer }
                            membership_purchase: { type: integer }
                            coupon_used: { type: integer }
                            refund: { type: integer }
                            adjustment: { type: integer }
                            bonus: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequestError'

  /brands/{id}/stats/redemptions:
    get:
      tags: [brands]
      summary: Get daily redemption history
      operationId: getBrandRedemptionHistory
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: store_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
      responses:
        '200':
          description: Daily redemption history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date }
                            redemptions: { type: integer }
                            pending: { type: integer }
                            completed: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequestError'

  /brands/{id}/stats/users/{userId}:
    get:
      tags: [brands]
      summary: Get user profile with loyalty cards for a brand
      operationId: getBrandUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User profile with cards
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          registered_at: { type: string, format: date-time }
                          user_id: { type: string, format: uuid }
                          full_name: { type: string }
                          email: { type: string }
                          phone: { type: ['string', 'null'] }
                          birth_date: { type: ['string', 'null'], format: date }
                          is_blocked: { type: boolean }
                          deleted_at: { type: ['string', 'null'], format: date-time }
                          loyalty_cards:
                            type: array
                            items:
                              $ref: '#/components/schemas/LoyaltyCardWithDetails'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /brands/{id}/users:
    get:
      tags: [brands]
      summary: List brand users (paginated)
      operationId: listBrandUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: store_id
          in: query
          schema: { type: string, format: uuid }
        - name: program_id
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of brand users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id: { type: string, format: uuid }
                            full_name: { type: string }
                            email: { type: string }
                            phone: { type: ['string', 'null'] }
                            birth_date: { type: ['string', 'null'], format: date }
                            created_at: { type: string, format: date-time }
                            loyalty_cards:
                              type: array
                              items:
                                type: object
                                properties:
                                  card_id: { type: string, format: uuid }
                                  status: { type: string }
                                  current_balance: { type: number }
                                  total_visits: { type: integer }
                                  last_visit_at: { type: string, format: date-time, nullable: true }
                                  created_at: { type: string, format: date-time }
                                  expired_at: { type: ['string', 'null'], format: date-time }
                                  program:
                                    type: object
                                    properties:
                                      program_id: { type: string, format: uuid }
                                      program_name: { type: string }
                                      program_rules: { type: object }
                                      reward_description: { type: string }
                                      is_active: { type: boolean }
                                  redemptions:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        redemption_id: { type: string, format: uuid }
                                        redemption_type: { type: string }
                                        status: { type: string }
                                        created_at: { type: string, format: date-time }
                                        updated_at: { type: string, format: date-time }
                                  transactions:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        transaction_id: { type: string, format: uuid }
                                        transaction_type: { type: string }
                                        amount: { type: number }
                                        unit_type: { type: string }
                                        created_at: { type: string, format: date-time }
                      pagination:
                        $ref: '#/components/schemas/CursorPagination'
        '400':
          $ref: '#/components/responses/BadRequestError'

  # ─── Stores ───────────────────────────────────────────
  /stores:
    get:
      tags: [stores]
      summary: List stores (paginated)
      operationId: listStores
      security:
        - BearerAuth: []
      parameters:
        - name: brand_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Cursor'
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Paginated list of stores
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Store'
                      pagination:
                        $ref: '#/components/schemas/CursorPagination'
        '400':
          $ref: '#/components/responses/BadRequestError'
    post:
      tags: [stores]
      summary: Create a store
      operationId: createStore
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreInput'
      responses:
        '201':
          description: Store created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Store'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /stores/{id}:
    patch:
      tags: [stores]
      summary: Update store
      operationId: updateStore
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUpdateInput'
      responses:
        '200':
          description: Store updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Store'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [stores]
      summary: Soft-delete store
      operationId: deleteStore
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ─── Loyalty Programs ─────────────────────────────────
  /loyalty-programs:
    get:
      tags: [loyalty-programs]
      summary: List loyalty programs (paginated)
      operationId: listLoyaltyPrograms
      security:
        - BearerAuth: []
      parameters:
        - name: brand_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of loyalty programs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/LoyaltyProgram'
                      pagination:
                        $ref: '#/components/schemas/CursorPagination'
        '400':
          $ref: '#/components/responses/BadRequestError'
    post:
      tags: [loyalty-programs]
      summary: Create loyalty program
      operationId: createLoyaltyProgram
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyProgramInput'
      responses:
        '201':
          description: Program created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoyaltyProgram'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /loyalty-programs/{id}:
    get:
      tags: [loyalty-programs]
      summary: Get program details (public)
      operationId: getLoyaltyProgram
      security: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Program details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoyaltyProgram'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [loyalty-programs]
      summary: Update loyalty program
      operationId: updateLoyaltyProgram
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                program_name: { type: string, minLength: 3 }
                description: { type: string }
                start_date: { type: string, format: date-time }
                end_date: { type: ['string', 'null'], format: date-time }
                reward_description: { type: string }
                program_rules: { $ref: '#/components/schemas/ProgramRules' }
                reward_rules: { type: object }
                wallet_design: { $ref: '#/components/schemas/WalletDesign' }
                metadata: { $ref: '#/components/schemas/Metadata' }
                is_active: { type: boolean }
      responses:
        '200':
          description: Program updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoyaltyProgram'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [loyalty-programs]
      summary: Soft-delete loyalty program
      operationId: deleteLoyaltyProgram
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ─── Loyalty Cards ────────────────────────────────────
  /loyalty-cards:
    post:
      tags: [loyalty-cards]
      summary: Issue loyalty card to customer
      operationId: createLoyaltyCard
      security: []
      description: Creates a loyalty card and the associated Apple/Google Wallet pass. Auto-creates the customer user if not exists.
      parameters:
        - name: user-agent
          in: header
          required: true
          description: Used to detect device OS (android/ios)
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [program_id, customer_email, customer_full_name]
              properties:
                program_id: { type: string, format: uuid }
                customer_email: { type: string, format: email }
                customer_full_name: { type: string, minLength: 2 }
                customer_birth_date: { type: string, format: date }
                customer_phone: { type: string, minLength: 5 }
      responses:
        '201':
          description: Card created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          card_id: { type: string, format: uuid }
                          os_name: { type: string, enum: [android, ios] }
                          save_to_wallet_url: { type: string, format: uri }
        '400':
          $ref: '#/components/responses/BadRequestError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /loyalty-cards/{id}:
    get:
      tags: [loyalty-cards]
      summary: Get loyalty card details
      operationId: getLoyaltyCard
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Card details with transactions and redemptions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoyaltyCardFull'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ─── Transactions ─────────────────────────────────────
  /transactions:
    post:
      tags: [transactions]
      summary: Add stamp (triggers wallet update)
      operationId: createTransaction
      description: |
        Processes a stamp transaction for a loyalty card. When `transaction_type` is `stamp_added`,
        `unit_type` must be `stamp`. Triggers wallet update (Google Wallet PATCH or Apple APNs push)
        and creates a redemption if the stamp threshold is reached.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card_id, store_id, transaction_type, unit_type]
              properties:
                card_id: { type: string, format: uuid }
                store_id: { type: string, format: uuid }
                amount: { type: ['number', 'null'], minimum: 0, default: 0 }
                transaction_type: { type: string, enum: [stamp_added] }
                unit_type: { $ref: '#/components/schemas/TransactionUnitType' }
                notes: { type: ['string', 'null'] }
      responses:
        '200':
          description: Transaction processed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          transaction_id: { type: string, format: uuid }
        '400':
          description: |
            Validation error. Possible `error_code` values:
            - `R0002` — Loyalty Card has expired
            - `R0004` — Loyalty Program is not active yet
            - `R0005` — Loyalty Program has ended
            - `R0007` — Store does not belong to the program brand
            - `R0008` — Interval between transactions not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: |
            Resource not found. Possible `error_code` values:
            - `R0001` — Loyalty Card not found
            - `R0003` — Loyalty Program not found
            - `R0006` — Store not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Redemptions ──────────────────────────────────────
  /redemptions/{id}:
    patch:
      tags: [redemptions]
      summary: Update redemption status
      operationId: updateRedemption
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [completed] }
      responses:
        '200':
          description: Redemption updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Redemption'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ─── Images ───────────────────────────────────────────
  /images/stamp-card:
    post:
      tags: [images]
      summary: Generate stamp card images (async)
      operationId: createStampCard
      security: []
      description: Fire-and-forget. Generates N+1 stamp card PNG images and uploads to S3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [program_id]
              properties:
                program_id: { type: string, format: uuid }
                logo_image: { type: ['string', 'null'] }
                stamp_background_image: { type: ['string', 'null'] }
                stamp_icon_image: { type: ['string', 'null'] }
                stamp_icon_background_checked: { type: ['string', 'null'] }
                stamp_icon_background_unchecked: { type: ['string', 'null'] }
      responses:
        '200':
          description: Accepted (processing in background)
        '400':
          $ref: '#/components/responses/BadRequestError'

  # ─── Notifications ──────────────────────────────────
  /notifications/wallet:
    post:
      tags: [notifications]
      summary: Send wallet push notifications to loyalty card holders
      description: |
        Sends push notifications to all wallet holders for a brand, optionally scoped to a specific program.
        - **Google Wallet**: Sends a visible notification with the provided header/body text via `addMessage`.
        - **Apple Wallet**: Sends a silent APNs push that triggers the device to re-download the pass.
        Returns 202 immediately; notifications are processed asynchronously.
      operationId: sendWalletNotification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brand_id, message]
              properties:
                brand_id:
                  type: string
                  format: uuid
                  description: Brand ID to send notifications for
                program_id:
                  type: string
                  format: uuid
                  description: Optional program ID to scope notifications to a specific program
                message:
                  type: object
                  required: [header, body]
                  properties:
                    header:
                      type: string
                      maxLength: 40
                      description: Notification header (used for Google Wallet)
                    body:
                      type: string
                      maxLength: 200
                      description: Notification body (used for Google Wallet)
      responses:
        '202':
          description: Notification processing started
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Processing started
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  # ─── Short URLs ──────────────────────────────────────
  /short-urls/{code}:
    get:
      tags: [short-urls]
      summary: Resolve a short URL code
      operationId: resolveShortUrl
      security: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{8}$'
          description: The short URL code
      responses:
        '200':
          description: Short URL resolved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          original_url: { type: string, format: uri }
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  # ─── Apple Wallet PassKit ─────────────────────────────
  /apple-wallet/v1/devices/{deviceLibraryIdentifier}/registrations/{passTypeIdentifier}/{serialNumber}:
    post:
      tags: [apple-wallet]
      summary: Register device for pass updates
      operationId: registerAppleDevice
      parameters:
        - $ref: '#/components/parameters/DeviceLibraryIdentifier'
        - $ref: '#/components/parameters/PassTypeIdentifier'
        - $ref: '#/components/parameters/SerialNumber'
      security:
        - ApplePassAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pushToken]
              properties:
                pushToken: { type: string }
      responses:
        '201':
          description: Device registered
        '401':
          description: Unauthorized
    delete:
      tags: [apple-wallet]
      summary: Unregister device
      operationId: unregisterAppleDevice
      parameters:
        - $ref: '#/components/parameters/DeviceLibraryIdentifier'
        - $ref: '#/components/parameters/PassTypeIdentifier'
        - $ref: '#/components/parameters/SerialNumber'
      security:
        - ApplePassAuth: []
      responses:
        '200':
          description: Device unregistered
        '401':
          description: Unauthorized

  /apple-wallet/v1/devices/{deviceLibraryIdentifier}/registrations/{passTypeIdentifier}:
    get:
      tags: [apple-wallet]
      summary: Get updatable passes for a device
      operationId: getUpdatablePasses
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceLibraryIdentifier'
        - $ref: '#/components/parameters/PassTypeIdentifier'
        - name: passesUpdatedSince
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Updatable passes
          content:
            application/json:
              schema:
                type: object
                properties:
                  serialNumbers: { type: array, items: { type: string } }
                  lastUpdated: { type: string }
        '204':
          description: No passes to update
        '404':
          description: No registered passes

  /apple-wallet/v1/passes/{passTypeIdentifier}/{serialNumber}:
    get:
      tags: [apple-wallet]
      summary: Download .pkpass file
      operationId: getApplePass
      parameters:
        - $ref: '#/components/parameters/PassTypeIdentifier'
        - $ref: '#/components/parameters/SerialNumber'
        - name: if-modified-since
          in: header
          schema: { type: string }
      security:
        - ApplePassAuth: []
      responses:
        '200':
          description: Pass file
          headers:
            Last-Modified: { schema: { type: string } }
          content:
            application/vnd.apple.pkpass:
              schema: { type: string, format: binary }
        '304':
          description: Not modified
        '401':
          description: Unauthorized

  /apple-wallet/v1/log:
    post:
      tags: [apple-wallet]
      summary: Log device errors
      operationId: logAppleWalletError
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logs: { type: array, items: { type: string } }
      responses:
        '200':
          description: Logged
        '400':
          $ref: '#/components/responses/BadRequestError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token (HS256, 1-year expiry)
    ApplePassAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Format: ApplePass {user_id}.{program_id}.{card_id}'

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor for keyset pagination (takes precedence over page)
      schema: { type: string }
    FromDate:
      name: from
      in: query
      description: Start date (default 7 days ago)
      schema: { type: string, format: date }
    ToDate:
      name: to
      in: query
      description: End date (default today)
      schema: { type: string, format: date }
    DeviceLibraryIdentifier:
      name: deviceLibraryIdentifier
      in: path
      required: true
      schema: { type: string }
    PassTypeIdentifier:
      name: passTypeIdentifier
      in: path
      required: true
      schema: { type: string }
    SerialNumber:
      name: serialNumber
      in: path
      required: true
      schema: { type: string }

  schemas:
    # ─── Enums ──────────────────────────────────────────
    TransactionType:
      type: string
      enum: [stamp_added]
    TransactionUnitType:
      type: string
      enum: [point, stamp, currency]
    RedemptionType:
      type: string
      enum: [stamp_reward, cashback, discount, membership_benefit]
    RedemptionStatus:
      type: string
      enum: [pending, completed]
    CardStatus:
      type: string
      enum: [active, inactive, expired, redeemed, unregistered]

    # ─── Base responses ─────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        message: { type: string }
        timestamp: { type: string, format: date-time }

    ErrorResponse:
      type: object
      properties:
        error_code: { type: string }
        message: { type: string }
        timestamp: { type: string, format: date-time }
        details: { type: object }

    # ─── Pagination ─────────────────────────────────────
    CursorPagination:
      type: object
      properties:
        total: { type: integer }
        limit: { type: integer }
        has_next_page: { type: boolean }
        next_cursor: { type: ['string', 'null'] }

    # ─── Domain models ──────────────────────────────────
    Brand:
      type: object
      properties:
        brand_id: { type: string, format: uuid }
        brand_name: { type: string }
        description: { type: ['string', 'null'] }
        logo_url: { type: ['string', 'null'] }
        is_active: { type: boolean }

    Store:
      type: object
      properties:
        store_id: { type: string, format: uuid }
        store_name: { type: string }
        address: { type: ['string', 'null'] }
        city: { type: ['string', 'null'] }
        state: { type: ['string', 'null'] }
        country: { type: ['string', 'null'] }
        postal_code: { type: ['string', 'null'] }
        phone: { type: ['string', 'null'] }
        latitude: { type: ['number', 'null'] }
        longitude: { type: ['number', 'null'] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    StoreInput:
      type: object
      required: [brand_id, store_name]
      properties:
        brand_id: { type: string, format: uuid }
        store_name: { type: string, minLength: 2 }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        country: { type: string }
        postal_code: { type: string }
        phone: { type: string }
        latitude: { type: number }
        longitude: { type: number }

    StoreUpdateInput:
      type: object
      properties:
        store_name: { type: string, minLength: 2 }
        address: { type: string }
        city: { type: string }
        state: { type: string }
        country: { type: string }
        postal_code: { type: string }
        phone: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        is_active: { type: boolean }

    ProgramRules:
      type: object
      properties:
        stamps_required: { type: integer, minimum: 1, maximum: 20, default: 10 }
        required_customer_fields:
          type: object
          properties:
            phone: { type: boolean }
            birth_date: { type: boolean }
        interval_between_transactions_hours: { type: integer, minimum: 1, maximum: 24 }
        card_validity_days:
          {
            type: ['integer', 'null'],
            minimum: 1,
            maximum: 365,
            description: 'Number of days a card is valid after creation. After this period, no stamps can be added.',
          }

    Metadata:
      type: object
      properties:
        terms_and_conditions: { type: ['string', 'null'] }
        contact_email: { type: ['string', 'null'], format: email }
        contact_phone: { type: ['string', 'null'] }
        website: { type: ['string', 'null'] }

    WalletDesign:
      type: object
      properties:
        hex_background_color: { type: string, pattern: '^#[0-9a-fA-F]{6,8}$', default: '#ffffffff' }
        hex_foreground_color: { type: string, pattern: '^#[0-9a-fA-F]{6,8}$', default: '#ffffff' }
        hex_label_color: { type: string, pattern: '^#[0-9a-fA-F]{6,8}$', default: '#ffffff' }
        show_logo_text: { type: boolean, default: true }

    LoyaltyProgram:
      type: object
      properties:
        program_id: { type: string, format: uuid }
        program_type_id: { type: string, format: uuid }
        brand_id: { type: string, format: uuid }
        program_name: { type: string }
        description: { type: ['string', 'null'] }
        start_date: { type: string, format: date-time }
        end_date: { type: ['string', 'null'], format: date-time }
        reward_description: { type: ['string', 'null'] }
        program_rules: { $ref: '#/components/schemas/ProgramRules' }
        reward_rules: { type: object }
        images: { type: object }
        wallet_design: { $ref: '#/components/schemas/WalletDesign' }
        metadata: { $ref: '#/components/schemas/Metadata' }
        is_active: { type: boolean }
        brand:
          type: object
          properties:
            logo_url: { type: ['string', 'null'], format: uri }
        short_url: { type: ['string', 'null'], format: uri }
        member_count: { type: integer, description: Total number of loyalty cards for this program }
        created_at: { type: string, format: date-time }

    LoyaltyProgramInput:
      type: object
      required: [program_type_id, brand_id, store_ids, program_name, start_date]
      properties:
        program_type_id: { type: string, format: uuid }
        brand_id: { type: string, format: uuid }
        store_ids: { type: array, items: { type: string, format: uuid }, minItems: 1 }
        program_name: { type: string, minLength: 3 }
        description: { type: string }
        start_date: { type: string, format: date-time }
        end_date: { type: string, format: date-time }
        reward_description: { type: string }
        program_rules: { $ref: '#/components/schemas/ProgramRules' }
        reward_rules: { type: object }
        wallet_design: { $ref: '#/components/schemas/WalletDesign' }
        metadata: { $ref: '#/components/schemas/Metadata' }

    LoyaltyCardFull:
      type: object
      properties:
        card_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/CardStatus' }
        device: { type: object }
        current_balance: { type: number }
        total_visits: { type: integer }
        last_visit_at: { type: ['string', 'null'], format: date-time }
        created_at: { type: string, format: date-time }
        expired_at: { type: ['string', 'null'], format: date-time }
        customer:
          type: object
          properties:
            user_id: { type: string, format: uuid }
            full_name: { type: string }
            email: { type: string }
            phone: { type: ['string', 'null'] }
        program:
          type: object
          properties:
            program_id: { type: string, format: uuid }
            program_name: { type: string }
            description: { type: ['string', 'null'] }
            program_rules: { $ref: '#/components/schemas/ProgramRules' }
            reward_description: { type: ['string', 'null'] }
            start_date: { type: string, format: date-time }
            end_date: { type: ['string', 'null'], format: date-time }
            is_active: { type: boolean }
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        redemptions:
          description: Pending redemptions only (limited to 10)
          type: array
          items:
            type: object
            properties:
              redemption_id: { type: string, format: uuid }
              redemption_type: { $ref: '#/components/schemas/RedemptionType' }
              created_at: { type: string, format: date-time }

    LoyaltyCardWithDetails:
      type: object
      properties:
        card_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/CardStatus' }
        current_balance: { type: number }
        total_visits: { type: integer }
        last_visit_at: { type: ['string', 'null'], format: date-time }
        expired_at: { type: ['string', 'null'], format: date-time }
        program:
          type: object
          properties:
            program_id: { type: string, format: uuid }
            program_name: { type: string }
            program_rules: { $ref: '#/components/schemas/ProgramRules' }
            reward_description: { type: ['string', 'null'] }
            is_active: { type: boolean }
        redemptions:
          type: array
          items:
            $ref: '#/components/schemas/Redemption'

    Transaction:
      type: object
      properties:
        transaction_id: { type: string, format: uuid }
        transaction_type: { $ref: '#/components/schemas/TransactionType' }
        unit_type: { $ref: '#/components/schemas/TransactionUnitType' }
        amount: { type: number }
        balance_after: { type: number }
        notes: { type: ['string', 'null'] }
        processed_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    Redemption:
      type: object
      properties:
        redemption_id: { type: string, format: uuid }
        redemption_type: { $ref: '#/components/schemas/RedemptionType' }
        value_redeemed: { type: ['number', 'null'] }
        amount_used: { type: ['integer', 'null'] }
        status: { $ref: '#/components/schemas/RedemptionStatus' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

  responses:
    MessageResponse:
      description: Success with message
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
